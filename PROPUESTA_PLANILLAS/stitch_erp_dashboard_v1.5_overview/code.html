<!DOCTYPE html>
<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Gestión Masiva de Partidas v1.5</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#4F46E5", // Indigo 600
                        "background-light": "#F8FAFC", // Slate 50
                        "background-dark": "#0F172A", // Slate 900
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                        sans: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                        "3xl": "1.5rem",
                    },
                },
            },
        };
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-slate-200 dark:bg-slate-950 min-h-screen flex items-center justify-center p-4 lg:p-8">
<div class="w-full max-w-7xl bg-background-light dark:bg-background-dark rounded-3xl shadow-2xl overflow-hidden flex flex-col border border-slate-200 dark:border-slate-800 transition-all duration-300">
<div class="px-8 py-6 flex items-center justify-between border-b border-slate-200 dark:border-slate-800">
<h1 class="text-2xl font-black text-slate-900 dark:text-white tracking-tight">
                Gestión Masiva de Partidas <span class="text-primary text-sm font-semibold ml-2">v1.5</span>
</h1>
<button class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 text-slate-500 transition-colors">
<span class="material-icons-round">close</span>
</button>
</div>
<div class="px-8 pt-6 pb-2 space-y-6">
<div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
<div class="flex p-1 bg-slate-200/50 dark:bg-slate-800/50 rounded-xl w-fit">
<button class="flex items-center gap-2 px-4 py-2 bg-white dark:bg-slate-700 shadow-sm rounded-lg text-sm font-bold text-primary">
<span class="material-icons-round text-sm">inventory_2</span>
                        Materiales
                        <span class="bg-primary/10 text-primary px-1.5 py-0.5 rounded text-[10px]">0</span>
</button>
<button class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200 transition-all">
<span class="material-icons-round text-sm">engineering</span>
                        Mano de Obra
                        <span class="bg-slate-300 dark:bg-slate-700 text-slate-600 dark:text-slate-400 px-1.5 py-0.5 rounded text-[10px]">0</span>
</button>
<button class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200 transition-all">
<span class="material-icons-round text-sm">local_shipping</span>
                        Movilidad
                        <span class="bg-slate-300 dark:bg-slate-700 text-slate-600 dark:text-slate-400 px-1.5 py-0.5 rounded text-[10px]">0</span>
</button>
</div>
<div class="flex p-1 bg-slate-200/50 dark:bg-slate-800/50 rounded-xl w-fit">
<button class="flex items-center gap-2 px-4 py-2 bg-primary text-white shadow-lg shadow-primary/20 rounded-lg text-sm font-bold">
<span class="material-icons-round text-sm">payments</span>
                        Vista Presupuesto
                    </button>
<button class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200 transition-all">
<span class="material-icons-round text-sm">receipt_long</span>
                        Vista Real (Gasto)
                    </button>
</div>
</div>
<div class="flex gap-4 border-b border-slate-200 dark:border-slate-800">
<button class="px-4 py-2 border-b-2 border-primary text-primary font-bold text-xs uppercase tracking-wider">
                    Principal
                </button>
<button class="px-4 py-2 border-b-2 border-transparent text-slate-400 font-bold text-xs uppercase tracking-wider hover:text-slate-600 dark:hover:text-slate-200">
                    Adicionales
                </button>
</div>
</div>
<div class="flex-1 overflow-x-auto px-8">
<table class="w-full text-left border-separate border-spacing-y-2">
<thead>
<tr class="text-slate-500 dark:text-slate-400 text-[10px] font-black uppercase tracking-widest">
<th class="pb-4 pl-4">Descripción</th>
<th class="pb-4">Unidad</th>
<th class="pb-4 text-center">Cant. Presup.</th>
<th class="pb-4 text-right">Precio U. Presup.</th>
<th class="pb-4 text-center">Cant. Real</th>
<th class="pb-4 text-right">Precio U. Real</th>
<th class="pb-4 pr-4 text-right">Total (S/)</th>
</tr>
</thead>
<tbody>
<tr class="group">
<td class="py-12 text-center bg-white/50 dark:bg-slate-800/30 rounded-2xl border-2 border-dashed border-slate-200 dark:border-slate-800" colspan="7">
<div class="flex flex-col items-center gap-3">
<span class="material-icons-round text-4xl text-slate-300 dark:text-slate-700">inventory</span>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium">No hay items en esta sección.</p>
<button class="mt-2 flex items-center gap-2 px-4 py-2 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg text-sm font-bold text-slate-700 dark:text-slate-200 hover:shadow-md transition-all">
<span class="material-icons-round text-primary">add_circle_outline</span>
                                    Comenzar a añadir ítems
                                </button>
</div>
</td>
</tr>
</tbody>
</table>
</div>
<div class="px-8 py-8 mt-auto border-t border-slate-200 dark:border-slate-800 bg-white/50 dark:bg-slate-900/50 flex flex-col sm:flex-row justify-between items-center gap-4">
<button class="flex items-center gap-2 px-5 py-2.5 border-2 border-slate-900 dark:border-slate-100 rounded-full text-sm font-black text-slate-900 dark:text-slate-100 hover:bg-slate-900 hover:text-white dark:hover:bg-white dark:hover:text-slate-900 transition-all">
<span class="material-icons-round text-base">add</span>
                Añadir ítem a Materiales
            </button>
<div class="flex items-center gap-3">
<button class="px-8 py-2.5 rounded-full text-sm font-bold text-slate-500 hover:text-slate-800 dark:hover:text-slate-200 transition-colors">
                    Cancelar
                </button>
<button class="flex items-center gap-3 px-8 py-2.5 bg-primary hover:bg-indigo-700 text-white rounded-full text-sm font-black shadow-xl shadow-primary/30 transition-all active:scale-95">
<span class="material-icons-round text-base">save</span>
                    GUARDAR TODO (0)
                </button>
</div>
</div>
</div>

</body></html>
